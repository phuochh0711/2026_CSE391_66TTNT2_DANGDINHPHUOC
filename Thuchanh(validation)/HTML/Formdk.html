<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Đăng Ký Tài Khoản</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 500px;
        margin: 40px auto;
        padding: 0 16px;
      }
      h2 {
        text-align: center;
        margin-bottom: 24px;
      }

      .field {
        margin-bottom: 16px;
      }
      .field label {
        display: block;
        margin-bottom: 4px;
        font-weight: bold;
      }
      .field input[type="text"],
      .field input[type="email"],
      .field input[type="tel"],
      .field input[type="password"] {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .field input.error {
        border-color: red;
      }

      .error-msg {
        color: red;
        font-size: 13px;
        margin-top: 4px;
        display: none;
      }
      .error-msg.visible {
        display: block;
      }

      .radio-group {
        display: flex;
        gap: 16px;
      }
      .radio-group label {
        font-weight: normal;
      }

      button[type="submit"] {
        width: 100%;
        padding: 10px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 15px;
        cursor: pointer;
      }
      button[type="submit"]:hover {
        background: #1d4ed8;
      }

      #success-screen {
        display: none;
        text-align: center;
        padding: 40px 0;
      }
      #success-screen h2 {
        color: green;
      }
    </style>
  </head>
  <body>
    <h2>Đăng Ký Tài Khoản</h2>
    <form id="register-form" novalidate>
      <!-- Họ và tên -->
      <div class="field">
        <label for="fullname">Họ và tên</label>
        <input type="text" id="fullname" placeholder="Nguyễn Văn An" />
        <div class="error-msg" id="err-fullname"></div>
      </div>

      <!-- Email -->
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="ten@domain.com" />
        <div class="error-msg" id="err-email"></div>
      </div>

      <!-- Số điện thoại -->
      <div class="field">
        <label for="phone">Số điện thoại</label>
        <input type="tel" id="phone" placeholder="0987654321" maxlength="10" />
        <div class="error-msg" id="err-phone"></div>
      </div>

      <!-- Mật khẩu -->
      <div class="field">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" placeholder="Tối thiểu 8 ký tự" />
        <div class="error-msg" id="err-password"></div>
      </div>

      <!-- Xác nhận mật khẩu -->
      <div class="field">
        <label for="confirm">Xác nhận mật khẩu</label>
        <input type="password" id="confirm" placeholder="Nhập lại mật khẩu" />
        <div class="error-msg" id="err-confirm"></div>
      </div>

      // Giới tính
      <div class="field">
        <label>Giới tính</label>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="male" /> Nam</label>
          <label><input type="radio" name="gender" value="female" /> Nữ</label>
          <label><input type="radio" name="gender" value="other" /> Khác</label>
        </div>
        <div class="error-msg" id="err-gender"></div>
      </div>
      <div class="field">
        <label>
          <input type="checkbox" id="terms" />
          Tôi đồng ý với điều khoản dịch vụ
        </label>
        <div class="error-msg" id="err-terms"></div>
      </div>

      <button type="submit">Đăng Ký</button>
    </form>
    <div id="success-screen">
      <h2>Đăng ký thành công!</h2>
      <p>Chào mừng bạn, <strong id="success-name"></strong>!</p>
    </div>

    <script src="../JS/Formdk.js"></script>
  </body>
</html>
